<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mine RPG Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=VT323&display=swap" rel="stylesheet">
    <style>
        body {
            background-color: #1a1a1a;
            color: #e0e0e0;
            font-family: 'VT323', monospace;
        }
        .progress-bar {
            height: 20px;
            background-color: #333;
            border-radius: 4px;
            overflow: hidden;
            border: 2px solid #000;
        }
        .progress-fill {
            height: 100%;
            transition: width 0.3s ease;
        }
        .stat-card {
            background-color: #2a2a2a;
            border: 4px solid #4a4a4a;
            image-rendering: pixelated;
        }
        .inventory-slot {
            background-color: #3a3a3a;
            border: 2px solid #5a5a5a;
            aspect-ratio: 1 / 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            position: relative;
        }
        .item-qty {
            position: absolute;
            bottom: 2px;
            right: 4px;
            font-size: 1.2rem;
            color: #fff;
            text-shadow: 2px 2px #000;
        }
    </style>
</head>
<body class="p-4 md:p-8">
    <div class="max-w-4xl mx-auto">
        <!-- Header -->
        <div class="flex justify-between items-center mb-8 border-b-4 border-gray-600 pb-4">
            <div>
                <h1 class="text-5xl text-yellow-500 mb-2">👤 <span id="player-name">DASHBOARD</span></h1>
                <p class="text-2xl">Status: <span id="status-text" class="text-green-500">ONLINE</span></p>
            </div>
            <div class="text-right">
                <div class="text-4xl text-blue-400">⭐ LEVEL <span id="level-val">1</span></div>
                <div class="w-64 mt-2">
                    <div class="text-xl mb-1 text-blue-300 text-center">XP: <span id="xp-text">0/100</span></div>
                    <div class="progress-bar">
                        <div id="xp-fill" class="progress-fill bg-blue-500" style="width: 0%"></div>
                    </div>
                </div>
            </div>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
            <!-- Vitals -->
            <div class="stat-card p-6 rounded-lg">
                <h2 class="text-3xl mb-4 border-b-2 border-gray-500">❤️ VITALS</h2>
                <div class="space-y-6">
                    <div>
                        <div class="flex justify-between text-2xl mb-1">
                            <span>Health</span>
                            <span id="hp-text">100/100</span>
                        </div>
                        <div class="progress-bar">
                            <div id="hp-fill" class="progress-fill bg-red-600" style="width: 100%"></div>
                        </div>
                    </div>
                    <div>
                        <div class="flex justify-between text-2xl mb-1">
                            <span>Stamina</span>
                            <span id="stamina-text">50/50</span>
                        </div>
                        <div class="progress-bar">
                            <div id="stamina-fill" class="progress-fill bg-yellow-500" style="width: 100%"></div>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Combat Stats -->
            <div class="stat-card p-6 rounded-lg">
                <h2 class="text-3xl mb-4 border-b-2 border-gray-500">⚔️ COMBAT & GEAR</h2>
                <div class="grid grid-cols-2 gap-4 text-3xl">
                    <div class="flex items-center">
                        <span class="mr-2">⚔️ Attack:</span>
                        <span id="attack-val" class="text-red-400">10</span>
                    </div>
                    <div class="flex items-center">
                        <span class="mr-2">🛡️ Defense:</span>
                        <span id="defense-val" class="text-blue-400">0</span>
                    </div>
                    <div class="col-span-2 mt-4">
                        <div class="text-2xl mb-1">🔨 Tool Durability</div>
                        <div class="progress-bar">
                            <div id="durability-fill" class="progress-fill bg-green-500" style="width: 100%"></div>
                        </div>
                        <div id="durability-text" class="text-center text-xl mt-1">50/50</div>
                    </div>
                </div>
            </div>

            <!-- Inventory -->
            <div class="stat-card p-6 rounded-lg md:col-span-2">
                <h2 class="text-3xl mb-4 border-b-2 border-gray-500">🎒 INVENTORY</h2>
                <div id="inventory-grid" class="grid grid-cols-4 sm:grid-cols-6 md:grid-cols-9 gap-2">
                    <!-- Slots will be populated by JS -->
                </div>
            </div>

            <!-- Structures -->
            <div class="stat-card p-6 rounded-lg md:col-span-2">
                <h2 class="text-3xl mb-4 border-b-2 border-gray-500">🏗️ STRUCTURES</h2>
                <div id="structures-list" class="flex flex-wrap gap-4 text-2xl">
                    <!-- Structure badges will be here -->
                </div>
            </div>
        </div>
        
        <footer class="mt-8 text-center text-gray-500 text-xl">
            Keep this tab open while you play in the terminal!
        </footer>
    </div>

    <script>
        const itemEmojis = {
            "wood": "🌲",
            "stone": "🪨",
            "iron": "⛓️",
            "gold": "💰",
            "diamond": "💎",
            "gel": "🟢",
            "rotten_flesh": "🧟",
            "string": "🕸️",
            "shadow_dust": "👻",
            "quartz": "🔥🧫",
            "netherite": "🔥",
            "void_essence": "🌌",
            "star_matter": "✨",
            "void_core": "👾",
            "bread": "🥖",
            "health_potion": "🧪",
            "stamina_potion": "⚡",
            "wood_pickaxe": "🪵⛏️",
            "stone_pickaxe": "🪨⛏️",
            "iron_pickaxe": "⛓️⛏️",
            "diamond_pickaxe": "💎⛏️",
            "netherite_pickaxe": "🔥⛏️",
            "sword": "🗡️",
            "iron_sword": "⚔️"
        };

        function updateDashboard() {
            fetch('/api/player')
                .then(response => response.json())
                .then(p => {
                    // Header & Progress
                    document.getElementById('player-name').innerText = p.name.toUpperCase();
                    document.getElementById('level-val').innerText = p.level;
                    document.getElementById('xp-text').innerText = `${p.xp}/${p.xp_to_next}`;
                    const xpPercent = (p.xp / p.xp_to_next) * 100;
                    document.getElementById('xp-fill').style.width = `${xpPercent}%`;

                    // Vitals
                    document.getElementById('hp-text').innerText = `${p.health}/${p.max_health}`;
                    document.getElementById('hp-fill').style.width = `${(p.health / p.max_health) * 100}%`;
                    
                    document.getElementById('stamina-text').innerText = `${p.stamina}/${p.max_stamina}`;
                    document.getElementById('stamina-fill').style.width = `${(p.stamina / p.max_stamina) * 100}%`;

                    // Stats
                    document.getElementById('attack-val').innerText = p.attack;
                    document.getElementById('defense-val').innerText = p.defense;
                    
                    // Durability (assuming max is 500 for repair kit, or base 50-100)
                    // We'll estimate max based on current value for visual feel
                    const maxDur = p.tool_durability > 100 ? 500 : 100;
                    document.getElementById('durability-text').innerText = `${p.tool_durability}`;
                    document.getElementById('durability-fill').style.width = `${Math.min(100, (p.tool_durability / maxDur) * 100)}%`;

                    // Inventory
                    const grid = document.getElementById('inventory-grid');
                    grid.innerHTML = '';
                    
                    // Create 18 slots total (Minecraft style)
                    const slots = 18;
                    const items = Object.entries(p.inventory).filter(([_, qty]) => qty > 0);
                    
                    for (let i = 0; i < slots; i++) {
                        const slot = document.createElement('div');
                        slot.className = 'inventory-slot';
                        
                        if (items[i]) {
                            const [id, qty] = items[i];
                            const emoji = itemEmojis[id] || "📦";
                            slot.innerHTML = `<span class="text-4xl">${emoji}</span><span class="item-qty">${qty}</span>`;
                            slot.title = id.replace('_', ' ');
                        }
                        
                        grid.appendChild(slot);
                    }

                    // Structures
                    const sList = document.getElementById('structures-list');
                    sList.innerHTML = '';
                    if (p.structures) {
                        Object.keys(p.structures).forEach(s => {
                            const badge = document.createElement('span');
                            badge.className = 'px-3 py-1 bg-gray-700 border-2 border-yellow-600 text-yellow-400 rounded';
                            badge.innerText = s.charAt(0).toUpperCase() + s.slice(1);
                            sList.appendChild(badge);
                        });
                    }
                    if (sList.innerHTML === '') sList.innerText = 'None yet... Time to build! 🔨';

                    document.getElementById('status-text').innerText = 'ONLINE';
                    document.getElementById('status-text').className = 'text-green-500';
                })
                .catch(err => {
                    document.getElementById('status-text').innerText = 'DISCONNECTED';
                    document.getElementById('status-text').className = 'text-red-500';
                });
        }

        // Poll every second
        setInterval(updateDashboard, 1000);
        updateDashboard();
    </script>
</body>
</html>
